name: 全球互联网动态情报站

# 防止重复并发：新的 scheduled run 启动时，取消还在跑的旧 run
concurrency:
  group: intelligence-station
  cancel-in-progress: true

on:
  # 每天 18:00 UTC (= 次日 02:00 北京时间) 自动运行
  schedule:
    - cron: '0 18 * * *'
  # 模板/脚本变更时自动 html-only 模式
  push:
    branches: [main]
    paths:
      - 'scripts/template.html'
      - 'scripts/generate_html.py'
  # 手动触发
  repository_dispatch:
    types: [rss-test]
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - html-only
          - rss-test

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and analyze news
        if: github.event_name != 'push' && (github.event_name != 'workflow_dispatch' || inputs.mode != 'html-only')
        run: |
          # 预检：测试关键 RSS 信源在 GitHub Actions 中的可达性
          echo "=== RSS 信源可达性预检 ==="
          SOURCES=(
            "https://techcrunch.com/feed/"
            "https://tech.eu/feed/"
            "https://www.techinasia.com/feed"
            "https://wamda.com/feed/"
          )
          ACCESSIBLE=0
          for src in "${SOURCES[@]}"; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 8 "$src")
            if [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ]; then
              echo "✅ $CODE $src"
              ACCESSIBLE=$((ACCESSIBLE+1))
            else
              echo "❌ $CODE $src"
            fi
          done
          echo "可达: $ACCESSIBLE/${#SOURCES[@]}"
          if [ $ACCESSIBLE -eq 0 ]; then
            echo "⚠️  所有 RSS 信源不可达，跳过采集（可能有网络限制）"
            echo '{}' > data/events.json
          else
            echo "=== 豆包 API 可用性检测 ==="
            RESP=$(curl -s -w "\n%{http_code}" -X POST "https://ark.cn-beijing.volces.com/api/v3/chat/completions" \
              -H "Authorization: Bearer $DOUBAO_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"model":"ep-20260409223830-dnt5b","messages":[{"role":"user","content":"hi"}],"stream":false}')
            HTTP_CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | head -c 300)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 豆包 API 可用"
            else
              echo "❌ 豆包 API 失败 (HTTP $HTTP_CODE): $BODY"
            fi
            python scripts/fetch_news.py
          fi
        env:
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}

      - name: Debug environment
        run: |
          python --version
          python -c "import jinja2; print('Jinja2:', jinja2.__version__)"
          python -c "import sys; print(sys.path)"
          cat data/events.json | head -c 1000

      - name: Generate HTML
        run: python scripts/generate_html.py --force

      - name: Verify output
        run: |
          if [ ! -f "docs/index.html" ]; then
            echo "ERROR: docs/index.html 未生成"
            exit 1
          fi
          SIZE=$(wc -c < docs/index.html)
          echo "HTML 文件大小: $SIZE bytes"
          if [ "$SIZE" -lt 5000 ]; then
            echo "WARNING: HTML 文件过小，可能生成失败"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TODAY=$(date +%Y-%m-%d)
          if [ -f "data/events.json" ]; then
            EVENT_COUNT=$(python -c "import json,sys;d=json.load(open('data/events.json'));print(len(d.get('$TODAY',[])))" 2>/dev/null || echo "0")
            echo "今日采集：$EVENT_COUNT 条"
          fi
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "没有变化，跳过提交"
          else
            COMMIT_MSG="Update $(date +%Y-%m-%d\ %H:%M)"
            git commit -m "$COMMIT_MSG"
            git push
            echo "提交成功: $COMMIT_MSG"
          fi

  rss-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'rss-test')
    # push 事件不触发 rss-test
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Test Google News RSS
        run: python scripts/test_rss.py

  notify-failure:
    needs: update
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: 检查是否已有未关闭告警
        id: check-issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0,10);
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: undefined,
              per_page: 50
            });
            const existing = issues.find(i => i.title.includes('[自动告警]'));
            console.log('::set-output name=has_issue::' + (existing ? 'true' : 'false'));
            if (existing) console.log('已有未关闭告警: ' + existing.number);

      - name: 创建告警 Issue
        if: steps.check-issue.outputs.has_issue != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[自动告警] 情报站更新失败 — ${new Date().toISOString().slice(0,10)}`,
              body: `工作流运行失败，请检查日志：https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
            console.log('已创建告警 Issue')
