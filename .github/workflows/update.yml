name: 全球互联网动态情报站

on:
  # 每天 18:00 UTC (= 次日 02:00 北京时间) 自动运行
  # 选择此时段：欧洲/亚太/中东/拉美当日新闻已全部发布，采集最完整
  schedule:
    - cron: '0 18 * * *'
  # 支持手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - html-only

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and analyze news
        if: inputs.mode != 'html-only'
        run: |
          RESP=$(curl -s -w "\n%{http_code}" -X POST "https://ark.cn-beijing.volces.com/api/v3/chat/completions" \
            -H "Authorization: Bearer $DOUBAO_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"doubao-lite-32k","messages":[{"role":"user","content":"hi"}],"stream":false}')
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -c 300)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ 豆包 API 可用"
          else
            echo "❌ 豆包 API 失败 (HTTP $HTTP_CODE): $BODY"
          fi
          python scripts/fetch_news.py
        env:
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}

      - name: Debug environment
        run: |
          python --version
          python -c "import jinja2; print('Jinja2:', jinja2.__version__)"
          python -c "import sys; print(sys.path)"
          cat data/events.json | head -c 1000

      - name: Generate HTML
        run: python scripts/generate_html.py

      - name: Verify output
        run: |
          if [ ! -f "docs/index.html" ]; then
            echo "ERROR: docs/index.html 未生成"
            exit 1
          fi
          SIZE=$(wc -c < docs/index.html)
          echo "HTML 文件大小: $SIZE bytes"
          if [ "$SIZE" -lt 5000 ]; then
            echo "WARNING: HTML 文件过小，可能生成失败"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TODAY=$(date +%Y-%m-%d)
          if [ -f "data/events.json" ]; then
            EVENT_COUNT=$(python -c "import json,sys;d=json.load(open('data/events.json'));print(len(d.get('$TODAY',[])))" 2>/dev/null || echo "0")
            echo "今日采集：$EVENT_COUNT 条"
          fi
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "没有变化，跳过提交"
          else
            COMMIT_MSG="Update $(date +%Y-%m-%d\ %H:%M)"
            git commit -m "$COMMIT_MSG"
            git push
            echo "提交成功: $COMMIT_MSG"
          fi

  notify-failure:
    needs: update
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: 创建告警 Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[自动告警] 情报站更新失败 — ${new Date().toISOString().slice(0,10)}`,
              body: `工作流运行失败，请检查日志：https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
